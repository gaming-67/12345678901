<!DOCTYPE html>
<html>
<head>
    <title>Stickman JS Platformer</title>
    <style>
        body { margin: 0; overflow: hidden; background: #222; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; }
        canvas { background: #fff; box-shadow: 0 0 20px rgba(0,0,0,0.5); border-radius: 4px; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui">Use <b>Arrow Keys</b> or <b>WASD</b> to Move & Jump</div>
    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

canvas.width = 800;
canvas.height = 400;

// Game Constants
const gravity = 0.8;
const friction = 0.8;

// Player Object
const player = {
    x: 50,
    y: 300,
    width: 20,
    height: 40,
    velX: 0,
    velY: 0,
    speed: 5,
    jumpStrength: 12,
    grounded: false,
    color: "#000"
};

// Level Platforms
const platforms = [
    { x: 0, y: 380, width: 800, height: 20 }, // Floor
    { x: 300, y: 300, width: 150, height: 20 },
    { x: 500, y: 220, width: 150, height: 20 },
    { x: 150, y: 150, width: 150, height: 20 }
];

const keys = {};

// Input Listeners
window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);

function drawStickman(x, y) {
    ctx.strokeStyle = player.color;
    ctx.lineWidth = 2;
    
    // Head
    ctx.beginPath();
    ctx.arc(x + 10, y + 8, 5, 0, Math.PI * 2);
    ctx.stroke();
    
    // Body
    ctx.beginPath();
    ctx.moveTo(x + 10, y + 13);
    ctx.lineTo(x + 10, y + 28);
    ctx.stroke();
    
    // Arms
    ctx.beginPath();
    ctx.moveTo(x, y + 18);
    ctx.lineTo(x + 20, y + 18);
    ctx.stroke();
    
    // Legs
    ctx.beginPath();
    ctx.moveTo(x + 10, y + 28);
    ctx.lineTo(x, y + 40);
    ctx.moveTo(x + 10, y + 28);
    ctx.lineTo(x + 20, y + 40);
    ctx.stroke();
}

function update() {
    // Movement Logic
    if (keys['ArrowUp'] || keys['KeyW'] || keys['Space']) {
        if (player.grounded) {
            player.velY = -player.jumpStrength;
            player.grounded = false;
        }
    }
    if (keys['ArrowRight'] || keys['KeyD']) {
        if (player.velX < player.speed) player.velX++;
    }
    if (keys['ArrowLeft'] || keys['KeyA']) {
        if (player.velX > -player.speed) player.velX--;
    }

    // Physics
    player.velX *= friction;
    player.velY += gravity;

    player.grounded = false;

    // Platform Collision
    for (let i = 0; i < platforms.length; i++) {
        let p = platforms[i];
        if (player.x < p.x + p.width &&
            player.x + player.width > p.x &&
            player.y < p.y + p.height &&
            player.y + player.height > p.y) {
            
            // Basic floor collision
            if (player.velY > 0) {
                player.grounded = true;
                player.velY = 0;
                player.y = p.y - player.height;
            }
        }
    }

    player.x += player.velX;
    player.y += player.velY;

    // Screen Bounds
    if (player.x < 0) player.x = 0;
    if (player.x > canvas.width - player.width) player.x = canvas.width - player.width;

    draw();
    requestAnimationFrame(update);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Draw Platforms
    ctx.fillStyle = "#555";
    platforms.forEach(p => {
        ctx.fillRect(p.x, p.y, p.width, p.height);
    });

    // Draw Stickman
    drawStickman(player.x, player.y);
}

update();
</script>
</body>
</html>
